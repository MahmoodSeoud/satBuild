name: Build and publish simulator image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'satdeploy-agent/**'
      - 'demo/**'
      - 'Dockerfile.sim'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Sim image only needs satdeploy-agent/ + demo/ — do NOT recurse
      # into satdeploy-apm/ submodules. They're unused by Dockerfile.sim
      # and a stale apm submodule pointer used to break this whole job.
      - name: Checkout (no submodules)
        uses: actions/checkout@v4

      - name: Init only the submodules the sim image needs
        run: |
          git submodule update --init --recursive --depth=1 \
            satdeploy-agent/lib/csp \
            satdeploy-agent/lib/dtp \
            satdeploy-agent/lib/param

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        id: lower
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sim
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lower.outputs.owner }}/satdeploy-sim:latest
            ${{ env.REGISTRY }}/${{ steps.lower.outputs.owner }}/satdeploy-sim:${{ github.sha }}
