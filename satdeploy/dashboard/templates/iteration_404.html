{% extends "base.html" %}
{% block title %}Iteration not found — satdeploy{% endblock %}
{% block main %}
<section class="iteration iteration--404">
  <h1>No iteration found</h1>
  <p>Hash <code>{{ file_hash }}</code> doesn't exist in <code>history.db</code>.</p>
  <p class="muted">
    It may have been pruned by <code>max_backups</code> rotation, or the URL is malformed.
  </p>
  <p><a href="/">← Back to dashboard</a></p>
</section>
{% endblock %}
