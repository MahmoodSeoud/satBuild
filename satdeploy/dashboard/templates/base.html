<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}satdeploy{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>
  <header class="topbar">
    <a href="/" class="brand">satdeploy</a>
    <div class="ticker"
         hx-get="/api/ticker"
         hx-trigger="load, every 2s"
         hx-swap="innerHTML">
      <span class="muted">loading…</span>
    </div>
  </header>
  <main>
    {% block main %}{% endblock %}
  </main>
</body>
</html>
