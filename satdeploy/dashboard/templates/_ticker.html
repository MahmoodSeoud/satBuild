{% if not events %}
  <span class="muted">No activity yet.</span>
{% else %}
  <ol class="ticker__list">
    {% for e in events[:5] %}
      <li class="ticker__row">
        <time>{{ e.timestamp }}</time>
        <span class="ticker__action ticker__action--{{ e.action }}">{{ e.action }}</span>
        <span>{{ e.app }}</span>
        <span class="muted">@ {{ e.module }}</span>
        <code>{{ e.file_hash[:8] if e.file_hash else '—' }}</code>
        <span class="muted">({{ e.source or 'cli' }})</span>
      </li>
    {% endfor %}
  </ol>
{% endif %}
