# satdeploy config for the dev container's local-loopback test setup.
# Matches the auto-launched stack: ground at node 19, target at node 5425,
# both talking through localhost zmqproxy.
#
# Test apps are generated by scripts/make-test-apps.sh and live in
# /tmp/satdeploy-test-apps/. Targets land in /tmp/satdeploy-target/ on
# the same container (the agent runs locally in the right pane).

defaults:
  name: disco-dev
  agent_node: 5425
  ground_node: 19
  zmq_endpoint: tcp://localhost:9600
  backup_dir: /tmp/satdeploy-backups
  max_backups: 10

apps:
  # ~50 B shell script — proves +x preservation + execution end-to-end
  hello:
    local: /tmp/satdeploy-test-apps/hello
    remote: /tmp/satdeploy-target/hello
    service: null

  # 100 KB binary — common case, sub-second transfer
  controller:
    local: /tmp/satdeploy-test-apps/controller
    remote: /tmp/satdeploy-target/controller
    service: null

  # 5 MB binary — exercises multi-buffer DTP transfer
  telemetry:
    local: /tmp/satdeploy-test-apps/telemetry
    remote: /tmp/satdeploy-target/telemetry
    service: null

  # 50 MB binary — long enough to Ctrl-C mid-transfer for cross-pass
  # resume verification (the thesis contribution). Push it, hit Ctrl-C
  # in the right pane to interrupt the agent, restart the agent, push
  # again — should resume from the bitmap sidecar instead of restarting.
  payload:
    local: /tmp/satdeploy-test-apps/payload
    remote: /tmp/satdeploy-target/payload
    service: null
